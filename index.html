<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Czat Klasowy PRO</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- EKRAN LOGOWANIA -->
    <div id="auth-screen" class="auth-wrapper">
        <div class="auth-card">
            <h2>Witaj w klasie 🌿</h2>
            <input type="text" id="username" placeholder="Login">
            <input type="password" id="password" placeholder="Hasło">
            <button onclick="handleAuth()">Zaloguj / Stwórz konto</button>
            <p style="font-size: 11px; margin-top: 10px; color: #666;">Admin: admin / admln</p>
        </div>
    </div>

    <!-- EKRAN GŁÓWNY -->
    <div id="app-screen" class="hidden">
        <aside id="side-menu">
            <div class="profile-section">
                <label class="avatar-label">
                    <img id="user-avatar" src="https://ui-avatars.com" alt="Avatar">
                    <input type="file" id="upload-avatar" hidden accept="image/*" onchange="changeAvatar(this)">
                </label>
                <div class="user-meta">
                    <span id="user-display"></span>
                    <div id="admin-tag" class="hidden">GŁÓWNY ADMIN</div>
                </div>
            </div>
            <nav class="pv-list">
                <p class="nav-title">Kanały</p>
                <div class="pv-item active" id="btn-Ogólny" onclick="switchChat('Ogólny')">🌐 Czat Ogólny</div>
                <p class="nav-title">Prywatne (PV)</p>
                <div class="pv-item" id="btn-Marek" onclick="switchChat('Marek')">👤 Marek</div>
                <div class="pv-item" id="btn-Ania" onclick="switchChat('Ania')">👤 Ania</div>
                <div class="pv-item" id="btn-Kamil" onclick="switchChat('Kamil')">👤 Kamil</div>
            </nav>
            <button onclick="location.reload()" class="logout-btn">Wyloguj</button>
        </aside>

        <main id="chat-area">
            <header class="chat-header">
                <h3 id="current-chat-title">Ogólny</h3>
                <button class="mode-btn" onclick="toggleDarkMode()">🌙</button>
            </header>
            
            <div id="chat-main"></div>

            <footer class="chat-footer">
                <label class="file-btn">
                    📎 <input type="file" id="msg-img" hidden accept="image/*" onchange="sendImage(this)">
                </label>
                <input type="text" id="msg-input" placeholder="Napisz wiadomość...">
                <button onclick="sendMsg()" class="send-btn">➤</button>
            </footer>
        </main>
    </div>

    <script src="script.js"></script>
</body>
</html>
