<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Czat Klasowy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <!-- EKRAN LOGOWANIA -->
    <div id="auth-screen" class="auth-wrapper">
        <div class="auth-card">
            <h2 id="auth-title">Witaj w klasie 🌿</h2>
            <input type="text" id="username" placeholder="Twój Login">
            <input type="password" id="password" placeholder="Hasło">
            <button onclick="handleAuth()" id="auth-btn">Zaloguj się</button>
            <p id="toggle-text" onclick="toggleMode()">Nie masz konta? Załóż konto</p>
        </div>
    </div>

    <!-- EKRAN CZATU (FULLSCREEN) -->
    <div id="app-screen" class="hidden">
        <header class="app-header">
            <span>Czat Klasowy: <b id="user-display"></b></span>
            <div class="settings-container">
                <button class="gear-btn" onclick="toggleSettings()">⚙️</button>
                <div id="settings-menu" class="hidden">
                    <button onclick="toggleDarkMode()">Tryb Ciemny</button>
                    <button onclick="location.reload()" class="logout-btn">Wyloguj</button>
                </div>
            </div>
        </header>

        <main id="chat-main"></main>

        <footer class="chat-footer">
            <label class="attach-btn">
                📎 <input type="file" id="img-input" hidden accept="image/*" onchange="sendFile(this)">
            </label>
            <input type="text" id="msg-input" placeholder="Napisz coś...">
            <button onclick="sendMsg()" class="send-btn">Wyślij</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
