<!DOCTYPE html>
<html lang="pl">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Czat Klasowy</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <!-- EKRAN LOGOWANIA -->
    <div id="auth-screen" class="flex-center">
        <div class="auth-card">
            <div class="logo">🌿</div>
            <h2>Witaj w klasie</h2>
            <input type="text" id="username" placeholder="Login">
            <input type="password" id="password" placeholder="Hasło">
            <button onclick="handleAuth()" id="main-btn">Zaloguj się</button>
            <p onclick="toggleMode()" id="toggle-text">Nie masz konta? Zarejestruj się</p>
        </div>
    </div>

    <!-- EKRAN CZATU (CAŁY EKRAN) -->
    <div id="app-screen" class="hidden">
        <header class="app-header">
            <div class="user-info">Czat Klasowy: <strong><span id="user-display"></span></strong></div>
            <div class="settings-menu">
                <button class="icon-btn" onclick="toggleSettings()">⚙️</button>
                <div id="settings-dropdown" class="hidden">
                    <button onclick="toggleDarkMode()">Tryb Ciemny</button>
                    <button onclick="logout()" class="logout-btn">Wyloguj</button>
                </div>
            </div>
        </header>

        <main id="chat-container">
            <div id="messages"></div>
        </main>

        <footer class="chat-footer">
            <label class="file-label">
                📷
                <input type="file" id="image-input" accept="image/*" onchange="sendImage(this)">
            </label>
            <input type="text" id="msg-input" placeholder="Napisz wiadomość...">
            <button onclick="sendMessage()" class="btn-send">Wyślij</button>
        </footer>
    </div>

    <script src="script.js"></script>
</body>
</html>
